name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main # Atur ke branch utama Anda (bisa 'main' atau 'master')

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18 # Sesuaikan dengan versi Node.js yang Anda gunakan
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Upload production-ready build files
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist # Path folder build Vite (pastikan benar 'dist')

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write      # Memberikan izin untuk menulis (deploy) ke GitHub Pages
      id-token: write   # Diperlukan untuk deployment GitHub Pages

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
